    function generatePrompt(form, bisnis, bisnisObj, mood, moodObj, palette, ukuran, aiTool) {
      const nama = form.nama.trim() || bisnisObj.val;
      const tagline = form.tagline.trim();
      const produk = form.produk.trim() || bisnisObj.desc;
      const promo = form.promo.trim();
      const harga = form.harga.trim();
      const telepon = form.telepon.trim();
      const alamat = form.alamat.trim();
      const sosmed = form.sosmed.trim();
      const elemen = form.elemen.trim();
      const tujuan = form.tujuan;

      let headline = promo ? promo.toUpperCase() : (tagline ? tagline.toUpperCase() : "TERPERCAYA & PROFESIONAL");
      let subHeadline = tagline && promo ? tagline : (produk ? `${produk.split(",")[0]}` : bisnisObj.desc);

      let cta = telepon ? `WA: ${telepon}` : "HUBUNGI KAMI SEKARANG";
      if (tujuan.includes("grand opening")) cta = "KUNJUNGI KAMI SEKARANG!";
      if (tujuan.includes("lowongan")) cta = "DAFTAR SEKARANG!";

      let visualEl = elemen || "";
      const bisnisVisuals = {
        "bengkel motor": "realistic motorcycle closeup, chrome engine parts, mechanic tools, oil drops",
        "laundry": "fluffy white clean clothes, washing machine bubbles, fresh fabric texture",
        "kuliner": "steaming hot delicious food close-up, fresh ingredients, plate styling",
        "minuman": "colorful cold drink with ice, condensation drops, fresh fruit garnish",
        "barbershop": "razor blade, scissors, comb, hair styling tools, sharp clean look",
        "fashion": "stylish clothing flat lay, fabric texture, trendy outfit arrangement",
        "elektronik": "modern gadgets, smartphone, LED light glow, tech circuit patterns"
      };
      const matchKey = Object.keys(bisnisVisuals).find(k => bisnis.toLowerCase().includes(k));
      if (!visualEl) visualEl = matchKey ? bisnisVisuals[matchKey] : "relevant business product or service visual, professional setting";

      const layout = moodObj?.layout || "balanced centered layout with clear visual hierarchy";

      let textSection = `\n\nTEKS PADA BANNER (susun dengan hierarki visual yang jelas):\n`;
      textSection += `• HEADLINE UTAMA (font besar, bold, kontras tinggi): "${headline}"\n`;
      textSection += `• Nama Bisnis (font medium, eyecatching): "${nama}"\n`;
      if (subHeadline) textSection += `• Sub-headline (font lebih kecil): "${subHeadline}"\n`;
      if (harga) textSection += `• Badge Harga (kotak highlight, eye-catching): "${harga}"\n`;
      textSection += `• CTA Button (tombol mencolok, kontras): "${cta}"\n`;
      if (sosmed) textSection += `• Info Kontak: "${sosmed}"\n`;
      if (alamat) textSection += `• Alamat singkat: "${alamat}"\n`;

      let prompt = `Desain banner ${tujuan} untuk bisnis "${nama}" yang bergerak di bidang ${bisnis}.\n\n`;
      prompt += `FORMAT & UKURAN: ${ukuran.val}.\n\n`;
      prompt += `GAYA VISUAL: ${moodObj?.val || mood}. ${layout}.\n\n`;
      prompt += `PALET WARNA: ${palette}.\n\n`;
      prompt += `ELEMEN VISUAL UTAMA: ${visualEl}.\n\n`;
      prompt += `KOMPOSISI & LAYOUT: ${layout}.\n\n`;
      prompt += `TIPOGRAFI: Pilih font yang sesuai dengan gaya ${moodObj?.val?.split(" ")[0] || "modern"}.`;
      prompt += textSection;
      
      return prompt;
    }

        <div>
          <div style={{ ...s.sectionTitle, marginBottom: 8 }}>{title}</div>
          <div onClick={() => ref.current.click()} style={{ ...s.uploadZone, borderColor: hasFile ? SUCCESS : BORDER, borderStyle: hasFile ? "solid" : "dashed" }}>
            <div style={s.badge}>{badge}</div>
            <input ref={ref} type="file" accept="image/*" multiple style={{ display: "none" }} onChange={e => onUpload(e.target.files)} />
            {files.length === 0 ? (<><div style={s.uploadIcon}>{icon}</div><div style={s.uploadTitle}>Klik untuk upload</div><div style={s.uploadSub}>{sub}</div></>) : (
              <><div style={{ display: "flex", flexWrap: "wrap", gap: 5, justifyContent: "center", marginBottom: 8 }}>{files.slice(0, 4).map((f, i) => <img key={i} src={f.preview} alt="" style={{ width: 52, height: 52, objectFit: "cover", borderRadius: 6, border: `1.5px solid ${BORDER}` }} />)}</div>
              <div style={{ fontSize: 11, color: SUCCESS, fontWeight: 600, marginBottom: 6 }}>{files.length} foto terpilih ✓</div>
              <div onClick={e => { e.stopPropagation(); onClear(); }} style={{ background: "rgba(255,77,77,0.12)", border: "1px solid rgba(255,77,77,0.3)", color: "#ff4d4d", fontSize: 11, padding: "4px 10px", borderRadius: 8, cursor: "pointer", display: "inline-block", fontWeight: 600 }}>✕ Hapus</div></>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [bisnis, setBisnis] = useState("bengkel motor / otomotif");
      const [mood, setMood] = useState(MOODS[0].val);
      const [palette, setPalette] = useState(PALETTES[0].val);
      const [ukuran, setUkuran] = useState(UKURAN[0]);
      const [aiTool, setAiTool] = useState(AI_TOOLS[0]);
      const [tab, setTab] = useState("prompt");
      const [result, setResult] = useState(null);
      const [copied, setCopied] = useState(false);
      const [refFiles, setRefFiles] = useState([]);
      const [asetFiles, setAsetFiles] = useState([]);
      const [form, setForm] = useState({ nama: "", tagline: "", produk: "", promo: "", harga: "", telepon: "", alamat: "", sosmed: "", jam: "", target: "", usp: "", elemen: "", catatan: "", tujuan: "promosi dan branding bisnis" });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const readFiles = (fileList, setter) => {
        const arr = [];
        let done = 0;
        Array.from(fileList).forEach(file => {
          const reader = new FileReader();
          reader.onload = e => { arr.push({ name: file.name, preview: e.target.result }); done++; if (done === fileList.length) setter([...arr]); };
          reader.readAsDataURL(file);
        });
      };

      const generate = () => {
        const bisnisObj = BISNIS.find(b => b.val === bisnis) || BISNIS[0];
        const moodObj = MOODS.find(m => m.val === mood) || MOODS[0];
        const prompt = generatePrompt(form, bisnis, bisnisObj, mood, moodObj, palette, ukuran, aiTool);
        const tips = aiTool.tips;
        let extra = "";
        if (refFiles.length) extra += `\n\n📌 CATATAN REFERENSI: Berdasarkan ${refFiles.length} foto referensi gaya desain.`;
        if (asetFiles.length) extra += `\n\n🖼️ CATATAN ASET: Harap sertakan dan proses ${asetFiles.length} foto produk terlampir.`;
        setResult({ prompt: prompt + extra, tips });
        setTab("prompt");
      };

      const copy = async () => {
        if (!result) return;
        await navigator.clipboard.writeText(result.prompt);
        setCopied(true); setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div style={s.wrap}>
          <header style={s.header}>
            <div style={s.logoBadge}>Dr. Banner</div>
            <div><div style={s.h1}>AI Prompt Generator</div><div style={s.sub}>Buat prompt banner bisnis profesional dalam detik</div></div>
            <div style={{ marginLeft: "auto", background: "rgba(61,220,132,0.12)", border: "1px solid rgba(61,220,132,0.3)", color: SUCCESS, fontSize: 11, padding: "4px 10px", borderRadius: 20, fontWeight: 500 }}>✅ Standalone Engine</div>
          </header>

          <div style={s.main}>
            <div style={s.stepRow}><div style={s.stepNum}>1</div><div style={s.stepTxt}>Pilih Jenis Bisnis</div></div>
            <div style={s.card}>
              <div style={s.grid3}>{BISNIS.map(b => <BisnisBtn key={b.val} {...b} active={bisnis === b.val} onClick={() => setBisnis(b.val)} />)}</div>
            </div>

            <div style={s.stepRow}><div style={s.stepNum}>2</div><div style={s.stepTxt}>Informasi Bisnis</div></div>
            <div style={s.card}>
              <div style={s.fieldGrid2}>
                <div><label style={s.fieldLabel}>Nama Bisnis</label><input style={s.input} value={form.nama} onChange={e=>set("nama",e.target.value)} placeholder="Contoh: Bengkel Jaya"/></div>
                <div><label style={s.fieldLabel}>Tagline</label><input style={s.input} value={form.tagline} onChange={e=>set("tagline",e.target.value)} placeholder="Contoh: Cepat & Bergaransi"/></div>
              </div>
              <div style={s.fieldGrid2}>
                <div><label style={s.fieldLabel}>Produk Utama</label><input style={s.input} value={form.produk} onChange={e=>set("produk",e.target.value)} placeholder="Contoh: Servis Motor"/></div>
                <div><label style={s.fieldLabel}>Promo</label><input style={s.input} value={form.promo} onChange={e=>set("promo",e.target.value)} placeholder="Contoh: Diskon 20%"/></div>
              </div>
              <div style={s.fieldGrid3}>
                <div><label style={s.fieldLabel}>Harga</label><input style={s.input} value={form.harga} onChange={e=>set("harga",e.target.value)} placeholder="Mulai 15rb"/></div>
                <div><label style={s.fieldLabel}>No. WA</label><input style={s.input} value={form.telepon} onChange={e=>set("telepon",e.target.value)} placeholder="0812..."/></div>
                <div><label style={s.fieldLabel}>Lokasi</label><input style={s.input} value={form.alamat} onChange={e=>set("alamat",e.target.value)} placeholder="Jl. Raya No.1"/></div>
              </div>
              <div>
                <label style={s.fieldLabel}>Tujuan Banner</label>
                <select style={s.select} value={form.tujuan} onChange={e=>set("tujuan",e.target.value)}>
                  <option value="promosi branding">Promosi & Branding</option>
                  <option value="promo khusus">Diskon Khusus</option>
                </select>
              </div>
            </div>

            <div style={s.stepRow}><div style={s.stepNum}>3</div><div style={s.stepTxt}>Upload Foto (Optional)</div></div>
            <div style={s.card}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                <UploadZone title="🖼️ Referensi Desain" badge="Ref" icon="📁" sub="Foto contoh layout spanduk" files={refFiles} onUpload={fl=>readFiles(fl,setRefFiles)} onClear={()=>setRefFiles([])} />
                <UploadZone title="📷 Aset Produk" badge="Aset" icon="🖼️" sub="Foto produk/logo brand" files={asetFiles} onUpload={fl=>readFiles(fl,setAsetFiles)} onClear={()=>setAsetFiles([])} />
              </div>
            </div>

            <div style={s.stepRow}><div style={s.stepNum}>4</div><div style={s.stepTxt}>Gaya Visual & Warna</div></div>
            <div style={s.card}>
              <div style={s.tagFlex}>{MOODS.map(m => <Chip key={m.val} label={m.label} active={mood === m.val} onClick={()=>setMood(m.val)}/>)}</div>
              <hr style={s.glowLine} />
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{PALETTES.map(p => <PaletteBtn key={p.val} label={p.label} gradient={p.g} active={palette === p.val} onClick={()=>setPalette(p.val)}/>)}</div>
            </div>

            <div style={s.stepRow}><div style={s.stepNum}>5</div><div style={s.stepTxt}>Ukuran Spanduk</div></div>
            <div style={s.card}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(120px,1fr))", gap: 10 }}>{UKURAN.map(u => <UkuranBtn key={u.val} {...u} active={ukuran.val === u.val} onClick={()=>setUkuran(u)}/>)}</div>
            </div>

            <div style={s.stepRow}><div style={s.stepNum}>6</div><div style={s.stepTxt}>Target Platform AI</div></div>
            <div style={s.card}>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>{AI_TOOLS.map(a => <AiBtn key={a.val} {...a} active={aiTool.val === a.val} onClick={()=>setAiTool(a)}/>)}</div>
            </div>

            <button style={s.btnGenerate} onClick={generate}>⚡ Generate Prompt Sekarang</button>

            {result && (
              <div style={{ marginTop: 24 }}>
                <div style={s.tabs}>
                  <div style={tab === "prompt" ? s.tabActive : s.tab} onClick={()=>setTab("prompt")}>🇮🇩 Prompt Banner</div>
                  <div style={tab === "tips" ? s.tabActive : s.tab} onClick={()=>setTab("tips")}>💡 Tips</div>
                </div>
                {tab === "prompt" ? (
                  <>
                    <div style={s.promptBox}>
                      <textarea readOnly value={result.prompt} style={{ ...s.textarea, minHeight: 180, border:"none", background:"transparent", color:TEXT }} />
                    </div>
                    <div style={s.copyRow}>
                      <button style={s.btnCopy} onClick={copy}>{copied ? "✅ Tersalin!" : "📋 Copy Prompt"}</button>
                    </div>
                  </>
                ) : (
                  <div style={s.tipsBox}>
                    {result.tips.map((t,i)=><p key={i} style={{fontSize:13, color:SUCCESS}}>{i+1}. {t}</p>)}
                  </div>
                )}
              </div>
            )}
          </div>
          <footer style={s.footer}>MASBAY Generator · Siap Copy Paste Keajaibanmu 🚀</footer>
        </div>
      );
    }

    // Menggunakan ReactDOM versi 18 standar
    const reactRoot = ReactDOM.createRoot(document.getElementById('root'));
    reactRoot.render(<App />);
  </script>
</body>
</html>
